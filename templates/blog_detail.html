{% extends 'base.html' %}

{% block content %}
<style>
    .article-container {
        max-width: 900px; /* Делаем поуже для удобного чтения */
        margin: 40px auto 80px auto;
        padding: 0 20px;
    }

    .btn-back {
        display: inline-flex; align-items: center; gap: 8px;
        color: var(--text-secondary); text-decoration: none;
        font-weight: 700; font-size: 15px; margin-bottom: 25px;
        transition: 0.2s;
    }
    .btn-back:hover { color: var(--primary-blue); transform: translateX(-5px); }

    /* Обложка статьи */
    .article-cover {
        width: 100%;
        height: 400px;
        border-radius: 24px;
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        background-size: cover;
        background-position: center;
        margin-bottom: -50px; /* Чтобы текст немного "наезжал" на картинку */
        position: relative;
        z-index: 1;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        display: flex; align-items: center; justify-content: center;
    }

    /* Главный блок с текстом (Стекло) */
    .article-content-box {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 24px;
        padding: 50px;
        position: relative;
        z-index: 2;
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        margin: 0 20px; /* Отступы по бокам */
    }
    
    body.dark-mode .article-content-box {
        background: rgba(30, 41, 59, 0.85);
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .article-meta {
        display: flex; gap: 20px; align-items: center;
        font-size: 14px; color: var(--text-muted); font-weight: 600;
        margin-bottom: 20px; flex-wrap: wrap;
    }
    .article-category {
        background: rgba(59, 130, 246, 0.1); color: #3b82f6;
        padding: 6px 15px; border-radius: 10px; font-weight: 800; text-transform: uppercase; font-size: 12px;
    }

    .article-title {
        font-size: 42px; font-weight: 900; color: var(--text-main);
        margin: 0 0 30px 0; line-height: 1.2;
    }

    .article-text {
        font-size: 18px; color: var(--text-secondary);
        line-height: 1.8; font-weight: 500;
    }
    .article-text p { margin-bottom: 20px; }

    @media (max-width: 768px) {
        .article-cover { height: 250px; border-radius: 16px; }
        .article-content-box { padding: 30px 20px; margin: 0; border-radius: 16px; }
        .article-title { font-size: 28px; }
        .article-text { font-size: 16px; }
    }
</style>

<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>

<div class="article-container">
    
    <a href="{% url 'blog' %}" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Назад в блог</a>

    <div class="article-cover" style="{% if post.image %}background-image: url('{{ post.image.url }}');{% endif %}">
        {% if not post.image %}
            <i class="fa-solid fa-newspaper" style="font-size: 80px; color: rgba(255,255,255,0.3);"></i>
        {% endif %}
    </div>

    <div class="article-content-box">
        
        <div class="article-meta">
            <span class="article-category">{{ post.category }}</span>
            <span><i class="fa-regular fa-calendar"></i> {{ post.created_at|date:"d E Y" }}</span>
            <span><i class="fa-regular fa-eye"></i> {{ post.views }} просмотров</span>
        </div>

        <h1 class="article-title">{{ post.title }}</h1>
        
        <div class="article-text">
            {{ post.content|linebreaks }} 
        </div>

    </div>

</div>
{% endblock %}
