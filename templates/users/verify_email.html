{% extends 'base.html' %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }

    .auth-container { 
        width: 100%;
        max-width: 480px; 
        background: var(--bg-card); 
        padding: 50px 40px; 
        border-radius: 28px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        border: 1px solid var(--border-color);
        text-align: center; 
        transition: all 0.3s ease;
    }
    
    .auth-icon {
        width: 80px;
        height: 80px;
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary-blue);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
        margin: 0 auto 25px auto;
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1);
    }

    .auth-title { 
        font-size: 28px; 
        margin-bottom: 15px; 
        color: var(--text-main); 
        font-weight: 900;
        letter-spacing: -0.5px;
    }
    
    .auth-description {
        color: var(--text-secondary);
        margin-bottom: 30px;
        font-size: 15px;
        line-height: 1.6;
        font-weight: 500;
        padding: 0 10px;
    }
    
    .auth-description b { color: var(--text-main); font-weight: 800; }

    /* 🔥 УЛУЧШЕННОЕ ПОЛЕ ДЛЯ ВВОДА КОДА 🔥 */
    .form-control-code { 
        width: 100%; 
        padding: 20px; 
        border: 2px solid var(--border-color); 
        background: var(--bg-body); 
        color: var(--primary-blue); 
        border-radius: 16px; 
        font-size: 38px; 
        text-align: center; 
        letter-spacing: 12px; 
        font-weight: 900;
        transition: 0.3s;
        box-sizing: border-box;
        font-family: 'Courier New', Courier, monospace;
        outline: none;
    }
    
    .form-control-code:focus { 
        border-color: var(--primary-blue); 
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
        background: var(--bg-card); 
    }
    
    .form-control-code::placeholder { 
        color: var(--text-muted); 
        opacity: 0.4; 
        letter-spacing: 12px;
        font-weight: 700;
    }
    
    .error-text { 
        color: #ef4444; 
        font-size: 14px; 
        font-weight: 700; 
        margin-top: 12px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        gap: 6px; 
    }
    
    .btn-auth { 
        width: 100%; 
        padding: 18px; 
        background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
        color: white; 
        border: none; 
        border-radius: 16px; 
        font-weight: 800; 
        font-size: 16px;
        cursor: pointer; 
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 25px;
    }
    
    .btn-auth:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(16, 185, 129, 0.4);
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 25px;
        color: var(--text-secondary);
        font-weight: 700;
        font-size: 14px;
        transition: 0.2s;
        text-decoration: none;
    }
    
    .back-link:hover { color: var(--primary-blue); }

    @media (max-width: 600px) {
        .auth-container { padding: 40px 25px; border-radius: 24px; }
        .auth-title { font-size: 24px; }
        .form-control-code { font-size: 30px; letter-spacing: 8px; padding: 15px; }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-container">
        
        <div class="auth-icon">
            <i class="fa-solid fa-envelope-shield"></i>
        </div>

        <h2 class="auth-title">Проверьте почту</h2>
        <p class="auth-description">Мы отправили вам секретный код. Введите его ниже, чтобы активировать ваш профиль в <b>QADAM</b>.</p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="code-input-wrapper">
                <input type="text" name="code" class="form-control-code" placeholder="000000" maxlength="6" required autofocus>
                
                {% if form.code.errors %}
                    <div class="error-text">
                        <i class="fa-solid fa-circle-exclamation"></i> {{ form.code.errors.0 }}
                    </div>
                {% endif %}
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="fa-solid fa-user-check"></i> Создать аккаунт
            </button>
        </form>
        
        <a href="{% url 'register' %}" class="back-link">
            Указали неверную почту? Вернуться назад
        </a>
    </div>
</div>
{% endblock %}
