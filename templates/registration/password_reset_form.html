{% extends 'base.html' %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }

    .auth-container { 
        width: 100%;
        max-width: 480px; 
        background: var(--bg-card); 
        padding: 50px 40px; 
        border-radius: 28px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        border: 1px solid var(--border-color);
        text-align: center; 
        transition: all 0.3s ease;
    }
    
    .auth-icon {
        width: 70px;
        height: 70px;
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary-blue);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 20px auto;
    }

    .auth-title { 
        font-size: 28px; 
        margin-bottom: 15px; 
        color: var(--text-main); 
        font-weight: 900;
        letter-spacing: -0.5px;
    }
    
    .auth-description {
        color: var(--text-secondary);
        margin-bottom: 35px;
        font-size: 15px;
        line-height: 1.6;
        font-weight: 500;
        padding: 0 10px;
    }
    
    .form-group { 
        margin-bottom: 25px; 
        text-align: left; 
    }
    
    .form-label {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: var(--text-secondary);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .form-control { 
        width: 100% !important; 
        padding: 16px 18px !important; 
        border: 2px solid var(--border-color) !important; 
        background: var(--bg-body) !important; 
        color: var(--text-main) !important; 
        border-radius: 14px !important; 
        font-size: 15px !important; 
        transition: 0.3s !important; 
        box-sizing: border-box !important; 
        font-family: inherit !important;
        font-weight: 600 !important;
    }
    
    .form-control:focus {
        border-color: var(--primary-blue) !important;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15) !important;
        outline: none !important;
        background: var(--bg-card) !important;
    }
    
    .form-control::placeholder {
        color: var(--text-muted) !important;
        opacity: 0.7 !important;
        font-weight: 500 !important;
    }
    
    .btn-auth { 
        width: 100%; 
        padding: 16px; 
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
        color: white; 
        border: none; 
        border-radius: 14px; 
        font-weight: 800; 
        font-size: 16px;
        cursor: pointer; 
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    
    .btn-auth:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 25px;
        color: var(--text-secondary);
        font-weight: 700;
        font-size: 14px;
        transition: 0.2s;
        text-decoration: none;
    }
    
    .back-link:hover {
        color: var(--primary-blue);
    }

    @media (max-width: 600px) {
        .auth-container { padding: 40px 25px; border-radius: 24px; }
        .auth-title { font-size: 24px; }
        .auth-icon { width: 60px; height: 60px; font-size: 26px; }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-container">
        
        <div class="auth-icon">
            <i class="fa-solid fa-unlock-keyhole"></i>
        </div>

        <h2 class="auth-title">Забыли пароль?</h2>
        
        <p class="auth-description">
            Не переживайте. Введите свой Email, и мы отправим вам ссылку для восстановления доступа.
        </p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_email" class="form-label">Ваш Email адрес</label>
                <input type="email" name="email" class="form-control" id="id_email" placeholder="example@mail.com" required>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="fa-solid fa-paper-plane"></i> Отправить ссылку
            </button>
        </form>

        <a href="{% url 'login' %}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Назад ко входу
        </a>
    </div>
</div>
{% endblock %}
