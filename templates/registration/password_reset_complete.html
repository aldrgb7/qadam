{% extends 'base.html' %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }

    .auth-container { 
        width: 100%;
        max-width: 480px; 
        background: var(--bg-card); 
        padding: 50px 40px; 
        border-radius: 28px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        border: 1px solid var(--border-color);
        text-align: center; 
        transition: all 0.3s ease;
    }
    
    /* Иконка успеха (зеленая) */
    .auth-icon-success {
        width: 80px;
        height: 80px;
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
        margin: 0 auto 25px auto;
        box-shadow: 0 10px 20px rgba(16, 185, 129, 0.1);
    }

    .auth-title { 
        font-size: 28px; 
        margin-bottom: 20px; 
        color: var(--text-main); 
        font-weight: 900;
        letter-spacing: -0.5px;
    }
    
    .auth-description {
        color: var(--text-secondary);
        margin-bottom: 35px;
        font-size: 15px;
        line-height: 1.6;
        font-weight: 500;
        padding: 0 10px;
    }
    
    .btn-auth { 
        width: 100%; 
        padding: 16px; 
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
        color: white; 
        border: none; 
        border-radius: 14px; 
        font-weight: 800; 
        font-size: 16px;
        cursor: pointer; 
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-decoration: none;
    }
    
    .btn-auth:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
        color: white;
    }

    @media (max-width: 600px) {
        .auth-container { padding: 40px 25px; border-radius: 24px; }
        .auth-title { font-size: 24px; }
        .auth-icon-success { width: 70px; height: 70px; font-size: 32px; }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-container">
        
        <div class="auth-icon-success">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <h2 class="auth-title">Готово!</h2>
        
        <p class="auth-description">
            Ваш пароль был успешно изменен. Теперь вы можете войти в свой аккаунт, используя новые данные.
        </p>
        
        <a href="{% url 'login' %}" class="btn-auth">
            <i class="fa-solid fa-right-to-bracket"></i> Войти с новым паролем
        </a>
    </div>
</div>
{% endblock %}
